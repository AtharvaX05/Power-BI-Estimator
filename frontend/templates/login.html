{% extends "base.html" %}

{% block title %}Login — Power BI Estimator{% endblock %}

{% block content %}
<div class="container-narrow" style="margin-top: 8vh;">
    <div class="auth-card">
        <h2>⚡ Power BI Estimator</h2>
        <p class="text-center text-muted mb-2">Sign in to your account</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Sign In</button>
        </form>

        <p class="footer-text">
            Don't have an account? <a href="/register">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
